<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | SOAR Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #c33;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .password-hint {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        
        .requirements {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #666;
        }
        
        .requirements i {
            color: #667eea;
            margin-right: 5px;
        }
        
        .requirements ul {
            list-style: none;
            margin-top: 8px;
            padding-left: 20px;
        }
        
        .requirements li {
            margin-bottom: 4px;
            position: relative;
        }
        
        .requirements li:before {
            content: "•";
            color: #667eea;
            font-weight: bold;
            position: absolute;
            left: -15px;
        }
        
        .optional-badge {
            font-size: 11px;
            font-weight: normal;
            color: #888;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Регистрация</h2>
        <div class="subtitle">Создайте аккаунт для доступа к SOAR платформе</div>
        
        {% if error %}
            <div class="error-message">
                ❌ {{ error }}
            </div>
        {% endif %}
        
        <div class="requirements">
            <i>📋 Требования к паролю:</i>
            <ul>
                <li>Минимум 6 символов</li>
                <li>Только латинские буквы и цифры</li>
            </ul>
        </div>
        
        <form method="POST" action="{{ url_for('register_page') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">👤 Имя пользователя *</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required 
                    placeholder="Введите логин"
                    value="{{ request.form.username if request.form.username }}"
                    pattern="[A-Za-z0-9]+"
                    title="Только латинские буквы и цифры"
                >
            </div>
            
            <div class="form-group">
                <label for="organization">🏢 Организация</label>
                <input 
                    type="text" 
                    id="organization" 
                    name="organization" 
                    placeholder="Введите название организации"
                    value="{{ request.form.organization if request.form.organization }}"
                >
            </div>
            
            <div class="form-group">
                <label for="password">🔑 Пароль *</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    placeholder="Введите пароль"
                    minlength="6"
                >
                <div class="password-hint">Минимум 6 символов</div>
            </div>
            
            <button type="submit">
                Зарегистрироваться
            </button>
        </form>
        
        <div class="login-link">
            Уже есть аккаунт? <a href="{{ url_for('login_page') }}">Войти</a>
        </div>
    </div>
</body>
</html>
