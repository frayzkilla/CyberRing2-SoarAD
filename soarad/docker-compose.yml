
services:
  web:
    image: ${REGISTRY_IMAGE:-soarad-web}:${IMAGE_TAG:-latest}
    build: .
    container_name: soar-platform
    ports:
      - "8080:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE=/app/data/soar.db
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:?set FLASK_SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - COOKIE_SECURE=${COOKIE_SECURE:-0}
      - TOKEN_TTL_SECONDS=${TOKEN_TTL_SECONDS:-3600}
    restart: unless-stopped
